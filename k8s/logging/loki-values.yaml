deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: my-loki-logs-bucket-1234345
      ruler: my-loki-logs-bucket-1234345
    s3:
      region: ap-south-1

singleBinary:
  replicas: 1

  persistence:
    enabled: true
    storageClass: ebs-sc
    size: 20Gi

serviceAccount:
  create: false
  name: loki

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

minio:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

gateway:
  enabled: true

lokiCanary:
  enabled: true